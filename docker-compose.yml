version: '3.8'

services:
  # 1. База данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: task_manager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: do6rblubatman
      POSTGRES_DB: task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Кэш Redis
  redis:
    image: redis:7-alpine
    container_name: task_manager_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 3. Локальный почтовый сервер MailHog
  mailhog:
    image: mailhog/mailhog
    container_name: task_manager_mail
    ports:
      - "1025:1025" # Порт для отправки писем
      - "8025:8025" # Порт для веб-интерфейса писем
    restart: unless-stopped

  # 4. Сборщик метрик Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: task_manager_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./src/main/resources/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 5. Дашборды Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: task_manager_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

# Объявляем тома для сохранения данных при перезапуске
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: